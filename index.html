<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peces Discus</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* === ESTILOS GENERALES === */
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background-color: #FFFFFF;
      color: #222;
    }

    h2 {
      color: #000;
    }

    /* === HERO === */
    .hero {
      position: relative;
      text-align: center;
      padding: 80px 20px;
      background: url('https://images.unsplash.com/photo-1617196034796-3c8b1bca73b9?auto=format&fit=crop&w=1500&q=80') center/cover no-repeat;
      color: white;
    }

    /* Overlay oscuro para contraste */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .hero h2, .hero p {
      position: relative; /* para que estén encima del overlay */
      z-index: 1;
    }

    .hero h2 {
      color: #EADA09;
      font-weight: bold;
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    }

    .hero p {
      color: #FFFFFF;
      font-size: 1.2rem;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
      max-width: 700px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <!-- HERO -->
  <section class="hero" id="inicio">
    <h2>Peces Discus de Alta Calidad</h2>
    <p>Venta, asesoría y envío a toda la República Mexicana</p>
  </section>
</body>
</html>
