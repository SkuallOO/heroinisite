<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroini Discus - Peces Disco Premium</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background-color: #FFFFFF;
            color: #222;
        }

        h2 {
            text-align: center;
        }

        header {
            background: #000;
            color: white;
            padding: 15px 0;
            text-align: center;
        }

        nav a {
            margin: 0 15px;
            color: white;

        }

        .hero {
            text-align: center;
            padding: 100px 20px;

            color: white;
        }

        .catalogo {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .tarjeta {
            background: white;
            width: 250px;
            text-align: center;
        }

        .tarjeta img {
            width: 100%;
        }

        footer {
            background: #000;
            color: white;
            text-align: center;
            padding: 20px;
        }

<body>

<header>
    <h1>Heroini Discus</h1>

<section class="hero">

    <p>Venta, asesoría y envío a toda la República Mexicana</p>
    <a href="#peces" class="btn">Ver catálogo</a>

<section>
    <h2>Catálogo</h2>
    
    <div class="tarjeta">
    <img src="img/blue diamon.jpg">
    <h3>Blue Diamond</h3>
    <p>Pez tranquilo y de color intenso</p>
    <div class="precio">$950 MXN</div>
    <a href="https://wa.me/525519381081" class="btn-whatsapp">Comprar por WhatsApp</a>
</div>
    
    <div class="catalogo">
        <div class="tarjeta">
            <img src="img/blue diamon.jpg">
            <h3>Blue Diamond</h3>
        </div>

        <div class="tarjeta">
            <img src="img/Red cover.jpg">
            <h3>Red Cover</h3>
        </div>

        <div class="tarjeta">
            <img src="img/leopard.jpg">
            <h3>Leopardo</h3>
        </div>
    </div>

<footer>
    <p>© 2025 Heroini Discus</p>
</footer>
